<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivrit — Hebrew Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
  :root {
    --parchment: #e8dcc8;
    --parchment-dim: #c4b49a;
    --bg: #15120f;
    --card: #231e18;
    --card-elevated: #2f2720;
    --gold: #d4af37;
    --gold-dim: #a68a2e;
    --amber: #f0c040;
    --green: #7ee787;
    --red: #ffa69e;
    --border: #3d3228;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    background: radial-gradient(circle at 50% 0%, #2a2218 0%, var(--bg) 60%);
    color: var(--parchment);
    font-family: 'Frank Ruhl Libre', Georgia, serif;
    overflow-x: hidden;
  }
  .app { min-height: 100%; display: flex; flex-direction: column; }
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(21, 18, 15, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .title-block { display: flex; align-items: baseline; gap: 10px; }
  .logo { font-size: 22px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
  .subtitle { font-size: 12px; color: var(--parchment-dim); text-transform: uppercase; letter-spacing: 2px; }
  .stats-corner {
    display: flex; gap: 14px; align-items: center; font-size: 13px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
  .stat-value { font-weight: 700; color: var(--gold); font-size: 16px; }
  .stat-label { font-size: 10px; color: var(--parchment-dim); text-transform: uppercase; letter-spacing: 1px; }
  .tabs {
    display: flex; gap: 8px; justify-content: center; padding: 14px 10px 6px;
  }
  .tab {
    background: transparent; border: 1px solid var(--border); color: var(--parchment-dim);
    padding: 8px 14px; border-radius: 999px; cursor: pointer; font-family: inherit;
    font-size: 13px; letter-spacing: 0.5px; transition: all .2s ease;
  }
  .tab.active { background: rgba(212,175,55,0.12); border-color: var(--gold); color: var(--gold); }
  .tab:hover:not(.active) { border-color: var(--parchment-dim); color: var(--parchment); }
  .main { flex: 1; padding: 10px 16px 40px; max-width: 720px; margin: 0 auto; width: 100%; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }
  .hebrew-xl {
    font-size: clamp(72px, 15vw, 140px);
    font-weight: 400;
    color: var(--parchment);
    text-align: center;
    direction: rtl;
    margin: 10px 0 6px;
    line-height: 1.1;
    font-family: 'Frank Ruhl Libre', Georgia, serif;
  }
  .hebrew-lg {
    font-size: clamp(40px, 10vw, 72px);
    font-weight: 400;
    color: var(--parchment);
    text-align: center;
    direction: rtl;
    margin: 6px 0;
    line-height: 1.2;
    font-family: 'Frank Ruhl Libre', Georgia, serif;
  }
  .hebrew-md {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 400;
    color: var(--parchment);
    text-align: center;
    direction: rtl;
    line-height: 1.3;
    font-family: 'Frank Ruhl Libre', Georgia, serif;
  }
  .label {
    text-align: center; color: var(--parchment-dim); font-size: 13px;
    text-transform: uppercase; letter-spacing: 2px; margin-top: 6px;
  }
  .options {
    display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 22px;
  }
  .option-btn {
    background: var(--card-elevated);
    border: 1px solid var(--border);
    color: var(--parchment);
    padding: 14px 16px; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-size: 16px; text-align: center;
    transition: transform .15s ease, border-color .2s ease, background .2s ease;
  }
  .option-btn:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--gold-dim); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: var(--green); background: rgba(126,231,135,0.08); color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(255,166,158,0.08); color: var(--red); animation: shake .35s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  .fade-in { animation: fadeIn .4s ease both; }
  .fade-in-up { animation: fadeInUp .5s ease both; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
  .flash-correct { animation: flashGreen .6s ease; }
  @keyframes flashGreen { 0%{box-shadow:0 0 0 rgba(126,231,135,0)} 50%{box-shadow:0 0 40px rgba(126,231,135,.25)} 100%{box-shadow:0 0 0 rgba(126,231,135,0)} }
  .progress-wrap { margin-top: 18px; }
  .progress-bar {
    height: 8px; background: var(--card-elevated); border-radius: 999px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 999px; transition: width .4s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--parchment-dim); margin-top: 6px; }
  .controls { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .btn-primary {
    background: linear-gradient(180deg, rgba(212,175,55,0.25), rgba(212,175,55,0.12));
    border: 1px solid var(--gold-dim); color: var(--gold);
    padding: 12px 22px; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-size: 15px; transition: all .2s ease;
  }
  .btn-primary:hover { transform: translateY(-1px); border-color: var(--gold); }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border); color: var(--parchment-dim);
    padding: 12px 18px; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-size: 14px;
  }
  .btn-ghost.active { border-color: var(--gold); color: var(--gold); }
  .detail-row { text-align: center; margin: 8px 0; }
  .detail-row .translit { font-size: 20px; color: var(--amber); font-weight: 500; letter-spacing: 1px; }
  .detail-row .meaning { font-size: 18px; color: var(--parchment); }
  .detail-row .tip {
    display: inline-block; margin-top: 10px; padding: 8px 14px; border-radius: 999px;
    background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.25);
    color: var(--parchment-dim); font-size: 13px;
  }
  .feedback { text-align: center; margin-top: 14px; font-size: 16px; font-weight: 700; min-height: 24px; }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }
  .session-badge {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; font-size: 13px; color: var(--parchment-dim);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .session-badge span { color: var(--gold); font-weight: 700; }
  .ornament { text-align: center; color: var(--gold-dim); font-size: 18px; letter-spacing: 4px; margin: 6px 0; }
  .ornament::before, .ornament::after { content: "◆"; margin: 0 8px; opacity: 0.5; }
  .streak { color: var(--amber); font-weight: 700; }
  @media (min-width: 560px) {
    .options { grid-template-columns: 1fr 1fr; }
    .header { padding: 14px 24px; }
    .main { padding: 14px 24px 50px; }
  }
</style>
</head>

/* =================== Helpers =================== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n, exclude) {
  const pool = arr.filter(x => x !== exclude);
  const shuffled = shuffle(pool);
  return shuffled.slice(0, n);
}
function weightedRandom(items, weights) {
  let total = weights.reduce((a, b) => a + b, 0);
  let rnd = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    if (rnd < weights[i]) return items[i];
    rnd -= weights[i];
  }
  return items[items.length - 1];
}

/* =================== Mode 1: Letters =================== */
function LetterQuiz({ stats, setStats }) {
  const [current, setCurrent] = React.useState(null);
  const [options, setOptions] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const [phase, setPhase] = React.useState("idle"); // idle | correct | wrong
  const [streak, setStreak] = React.useState(0);
  const [key, setKey] = React.useState(0);

  function nextQuestion() {
    const letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
    const wrongs = pickN(LETTERS.filter(l => l.name !== letter.name), 4, null).map(l => l.name);
    const opts = shuffle([letter.name, ...wrongs]);
    setCurrent(letter);
    setOptions(opts);
    setSelected(null);
    setPhase("idle");
    setKey(k => k + 1);
  }

  React.useEffect(() => { nextQuestion(); }, []);

  function handleClick(name) {
    if (phase !== "idle") return;
    const isCorrect = name === current.name;
    setSelected(name);
    if (isCorrect) {
      setPhase("correct");
      setStreak(s => s + 1);
      setStats(s => ({ ...s, score: s.score + 1, total: s.total + 1, streak: Math.max(s.streak, streak + 1) }));
      setTimeout(() => nextQuestion(), 900);
    } else {
      setPhase("wrong");
      setStreak(0);
      setStats(s => ({ ...s, total: s.total + 1, streak: Math.max(s.streak, streak) }));
      setTimeout(() => nextQuestion(), 1400);
    }
  }

  if (!current) return null;
  return (
    <div className={"card fade-in" + (phase === "correct" ? " flash-correct" : "")} key={key}>
      <div className="label">What is this letter called?</div>
      <div className="hebrew-xl">{current.char}</div>
      <div className="ornament"></div>
      <div className="options">
        {options.map((opt, i) => {
          let cls = "option-btn";
          if (phase === "correct" && opt === current.name) cls += " correct";
          else if (phase === "wrong" && opt === selected) cls += " wrong";
          else if (phase === "wrong" && opt === current.name) cls += " correct";
          return (
            <button key={i} className={cls} disabled={phase !== "idle"} onClick={() => handleClick(opt)}>
              {opt}
            </button>
          );
        })}
      </div>
      <div className="feedback" style={{ marginTop: 10 }}>
        {phase === "correct" ? <span className="correct">Correct! +1</span> : phase === "wrong" ? <span className="wrong">That was {current.name}</span> : <span style={{ color: "var(--parchment-dim)" }}>Streak: <span className="streak">{streak}</span></span>}
      </div>
    </div>
  );
}

/* =================== Mode 2: Word Explorer =================== */
function WordExplorer() {
  const [order, setOrder] = React.useState(() => shuffle([...Array(WORDS.length).keys()]));
  const [index, setIndex] = React.useState(0);
  const [isShuffle, setIsShuffle] = React.useState(true);
  const [animKey, setAnimKey] = React.useState(0);

  const current = WORDS[order[index]];
  const progress = ((index + 1) / order.length) * 100;

  function nextWord() {
    if (index + 1 < order.length) {
      setIndex(i => i + 1);
      setAnimKey(k => k + 1);
    } else {
      setIndex(0);
      if (isShuffle) setOrder(shuffle([...Array(WORDS.length).keys()]));
      setAnimKey(k => k + 1);
    }
  }

  function toggleShuffle() {
    const newShuffle = !isShuffle;
    setIsShuffle(newShuffle);
    const newOrder = newShuffle ? shuffle([...Array(WORDS.length).keys()]) : [...Array(WORDS.length).keys()];
    setOrder(newOrder);
    setIndex(0);
    setAnimKey(k => k + 1);
  }

  return (
    <div className="card">
      <div className="fade-in-up" key={animKey}>
        <div className="hebrew-lg">{current.hebrew}</div>
        <div className="ornament"></div>
        <div className="detail-row">
          <div className="translit">{current.transliteration}</div>
        </div>
        <div className="detail-row">
          <div className="meaning">{current.meaning}</div>
        </div>
        {current.tip && (
          <div className="detail-row">
            <div className="tip">💡 {current.tip}</div>
          </div>
        )}
      </div>
      <div className="controls">
        <button className="btn-primary" onClick={nextWord}>Next Word →</button>
        <button className={"btn-ghost" + (isShuffle ? " active" : "")} onClick={toggleShuffle}>{isShuffle ? "🔀 Shuffled" : "➡️ Sequential"}</button>
      </div>
      <div className="progress-wrap">
        <div className="progress-bar"><div className="progress-fill" style={{ width: progress + "%" }}></div></div>
        <div className="progress-label"><span>{index + 1} / {WORDS.length}</span><span>{Math.round(progress)}%</span></div>
      </div>
    </div>
  );
}

/* =================== Mode 3: Meaning Quiz =================== */
function MeaningQuiz({ stats, setStats }) {
  const [order, setOrder] = React.useState(() => shuffle([...Array(WORDS.length).keys()]));
  const [pos, setPos] = React.useState(0);
  const [wordStats, setWordStats] = React.useState({});
  const [selected, setSelected] = React.useState(null);
  const [phase, setPhase] = React.useState("idle"); // idle | correct | wrong
  const [options, setOptions] = React.useState([]);
  const [key, setKey] = React.useState(0);

  function buildOptions(wordIdx) {
    const correct = WORDS[wordIdx];
    const sameCat = WORDS.filter((w, i) => w.category === correct.category && i !== wordIdx);
    const pool = sameCat.length >= 2 ? sameCat : WORDS.filter((_, i) => i !== wordIdx);
    const wrongs = pickN(pool, 2, null).map(w => w.meaning);
    return shuffle([correct.meaning, ...wrongs]);
  }

  function nextWord() {
    // Weighted selection based on mistakes
    const all = [...Array(WORDS.length).keys()];
    const unseen = all.filter(i => !wordStats[i]);
    let nextIdx;
    if (unseen.length > 0) {
      nextIdx = unseen[Math.floor(Math.random() * unseen.length)];
    } else {
      const weights = all.map(i => {
        const s = wordStats[i] || { wrong: 0, lastSeen: 0 };
        return (s.wrong + 1) / (s.lastSeen + 1);
      });
      nextIdx = weightedRandom(all, weights);
    }
    const opts = buildOptions(nextIdx);
    setPos(p => p + 1);
    setOrder(o => { o[pos] = nextIdx; return o; }); // not used directly; we just track pos
    setOptions(opts);
    setSelected(null);
    setPhase("idle");
    setKey(k => k + 1);
    setWordStats(prev => {
      const next = { ...prev };
      next[nextIdx] = { ...(next[nextIdx] || { seen: 0, correct: 0, wrong: 0, lastSeen: 0 }), seen: (next[nextIdx]?.seen || 0) + 1, lastSeen: Date.now() };
      return next;
    });
    // store current word index in a ref-like state via currentWord state
    setCurrentWord(nextIdx);
  }

  const [currentWord, setCurrentWord] = React.useState(null);

  React.useEffect(() => {
    // init first word
    const idx = Math.floor(Math.random() * WORDS.length);
    setCurrentWord(idx);
    setOptions(buildOptions(idx));
    setWordStats({ [idx]: { seen: 1, correct: 0, wrong: 0, lastSeen: Date.now() } });
    setKey(1);
  }, []);

  function handleClick(meaning) {
    if (phase !== "idle" || currentWord === null) return;
    const correct = WORDS[currentWord].meaning;
    const isCorrect = meaning === correct;
    setSelected(meaning);
    if (isCorrect) {
      setPhase("correct");
      setStats(s => ({ ...s, score: s.score + 1, total: s.total + 1 }));
      setWordStats(prev => {
        const next = { ...prev };
        const cur = next[currentWord] || { seen: 0, correct: 0, wrong: 0 };
        next[currentWord] = { ...cur, correct: cur.correct + 1 };
        return next;
      });
    } else {
      setPhase("wrong");
      setStats(s => ({ ...s, total: s.total + 1 }));
      setWordStats(prev => {
        const next = { ...prev };
        const cur = next[currentWord] || { seen: 0, correct: 0, wrong: 0 };
        next[currentWord] = { ...cur, wrong: cur.wrong + 1 };
        return next;
      });
    }
    setTimeout(() => nextWord(), 1500);
  }

  const current = currentWord !== null ? WORDS[currentWord] : null;
  if (!current) return <div className="card" style={{ textAlign: "center", padding: 40 }}>Loading…</div>;

  const accuracy = stats.total > 0 ? Math.round((stats.score / stats.total) * 100) : 0;

  return (
    <div className={"card fade-in" + (phase === "correct" ? " flash-correct" : "")} key={key}>
      <div className="label">Choose the correct meaning</div>
      <div className="hebrew-md">{current.hebrew}</div>
      <div className="detail-row">
        <div className="translit" style={{ fontSize: 18, opacity: 0.9 }}>{current.transliteration}</div>
      </div>
      <div className="ornament"></div>
      <div className="options">
        {options.map((opt, i) => {
          let cls = "option-btn";
          if (phase !== "idle" && opt === current.meaning) cls += " correct";
          else if (phase === "wrong" && opt === selected) cls += " wrong";
          return (
            <button key={i} className={cls} disabled={phase !== "idle"} onClick={() => handleClick(opt)}>
              {opt}
            </button>
          );
        })}
      </div>
      <div className="feedback">
        {phase === "correct" ? <span className="correct">Correct!</span> : phase === "wrong" ? <span className="wrong">Incorrect — it means "{current.meaning}"</span> : <span style={{ color: "var(--parchment-dim)" }}>Session accuracy: {accuracy}%</span>}
      </div>
    </div>
  );
}

/* =================== App =================== */
function App() {
  const [mode, setMode] = React.useState(1);
  const [stats, setStats] = React.useState({ score: 0, total: 0, streak: 0 });

  const accuracy = stats.total > 0 ? Math.round((stats.score / stats.total) * 100) : 0;

  return (
    <div className="app">
      <header className="header">
        <div className="title-block">
          <div className="logo">Ivrit</div>
          <div className="subtitle">Hebrew Learning</div>
        </div>
        <div className="stats-corner">
          <div className="stat"><span className="stat-value">{stats.score}</span><span className="stat-label">Correct</span></div>
          <div className="stat"><span className="stat-value">{accuracy}%</span><span className="stat-label">Accuracy</span></div>
          <div className="stat"><span className="stat-value">{stats.streak}</span><span className="stat-label">Best Streak</span></div>
        </div>
      </header>
      <div className="tabs">
        <button className={"tab" + (mode === 1 ? " active" : "")} onClick={() => setMode(1)}>Letters</button>
        <button className={"tab" + (mode === 2 ? " active" : "")} onClick={() => setMode(2)}>Words</button>
        <button className={"tab" + (mode === 3 ? " active" : "")} onClick={() => setMode(3)}>Quiz</button>
      </div>
      <main className="main">
        {mode === 1 && <LetterQuiz stats={stats} setStats={setStats} />}
        {mode === 2 && <WordExplorer />}
        {mode === 3 && <MeaningQuiz stats={stats} setStats={setStats} />}
      </main>
      <div className="session-badge">
        Session: <span>{stats.score}</span> / {stats.total} correct
      </div>
    </div>
  );
}
