<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkCommand - YouTube to Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .mono {
            font-family: 'Fira Code', monospace;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .command-glow {
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .copy-feedback {
            display: none;
            position: absolute;
            top: -40px;
            right: 0;
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header -->
    <header class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-sky-400 to-blue-500 bg-clip-text text-transparent mb-2">
            LinkCommand
        </h1>
        <p class="text-slate-400">Transform YouTube URLs into terminal-ready commands.</p>
    </header>

    <!-- Main App -->
    <main class="w-full max-w-2xl glass-panel rounded-2xl p-6 md:p-8 shadow-2xl">
        <div class="space-y-6">
            <!-- Input Section -->
            <div>
                <label for="url-input" class="block text-sm font-medium text-slate-300 mb-2">Paste YouTube Link</label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="url-input" 
                        placeholder="https://www.youtube.com/watch?v=..." 
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none transition-all text-slate-200"
                    >
                    <button id="clear-btn" class="absolute right-3 top-3 text-slate-500 hover:text-slate-300">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>

            <!-- Output Section -->
            <div id="result-container" class="hidden fade-in space-y-4">
                <div class="relative">
                    <div id="copy-msg" class="copy-feedback">Copied!</div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Output Command</span>
                        <button onclick="copyToClipboard()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-slate-200 transition-colors">
                            <i class="fas fa-copy mr-1"></i> Copy
                        </button>
                    </div>
                    <div id="output-box" class="mono bg-black/50 p-4 rounded-xl border border-slate-800 text-sky-300 break-all leading-relaxed whitespace-pre-wrap command-glow">
                        <!-- Command appears here -->
                    </div>
                </div>

                <!-- Preview Info -->
                <div id="preview-info" class="flex items-center gap-4 p-4 bg-slate-800/50 rounded-xl border border-slate-700/50">
                    <div class="w-16 h-12 bg-slate-700 rounded flex-shrink-0 overflow-hidden">
                        <img id="thumb-preview" src="" alt="" class="w-full h-full object-cover hidden">
                        <div id="thumb-placeholder" class="w-full h-full flex items-center justify-center">
                            <i class="fab fa-youtube text-slate-500"></i>
                        </div>
                    </div>
                    <div>
                        <h4 id="video-id-text" class="text-sm font-semibold text-slate-200 uppercase tracking-tighter">ID: Unknown</h4>
                        <p class="text-xs text-slate-500">Ready for terminal execution</p>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="text-center py-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-800 rounded-full mb-4">
                    <i class="fas fa-terminal text-slate-600 text-2xl"></i>
                </div>
                <p class="text-slate-500 text-sm">Paste a link above to generate a command</p>
            </div>
        </div>
    </main>

    <footer class="mt-8 text-slate-500 text-xs">
        &copy; 2024 LinkCommand Generator • Built for Developers
    </footer>

    <script>
        const urlInput = document.getElementById('url-input');
        const clearBtn = document.getElementById('clear-btn');
        const outputBox = document.getElementById('output-box');
        const resultContainer = document.getElementById('result-container');
        const emptyState = document.getElementById('empty-state');
        const thumbPreview = document.getElementById('thumb-preview');
        const thumbPlaceholder = document.getElementById('thumb-placeholder');
        const videoIdText = document.getElementById('video-id-text');
        const copyMsg = document.getElementById('copy-msg');

        let currentType = 'yt-dlp';

        const templates = {
            'yt-dlp': (id, url) => `yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" ${url}`,
            'curl': (id, url) => `curl -I "${url}"`,
            'custom': (id, url) => `/usr/local/bin/process_video --id=${id} --source=youtube`
        };

        function extractVideoId(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length === 11) ? match[7] : null;
        }

        function updateUI() {
            const val = urlInput.value.trim();
            const id = extractVideoId(val);

            if (id) {
                emptyState.classList.add('hidden');
                resultContainer.classList.remove('hidden');
                
                // Update Command
                outputBox.innerText = templates[currentType](id, val);
                
                // Update Preview
                thumbPreview.src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
                thumbPreview.classList.remove('hidden');
                thumbPlaceholder.classList.add('hidden');
                videoIdText.innerText = `ID: ${id}`;
            } else {
                emptyState.classList.remove('hidden');
                resultContainer.classList.add('hidden');
            }
        }

        function setTemplate(type) {
            currentType = type;
            
            // UI classes
            document.querySelectorAll('.template-btn').forEach(btn => {
                btn.classList.remove('active', 'border-sky-500', 'bg-sky-500/10', 'text-sky-400');
                btn.classList.add('border-slate-700', 'text-slate-400');
                
                if(btn.dataset.type === type) {
                    btn.classList.add('active', 'border-sky-500', 'bg-sky-500/10', 'text-sky-400');
                    btn.classList.remove('border-slate-700', 'text-slate-400');
                }
            });

            updateUI();
        }

        function copyToClipboard() {
            const text = outputBox.innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // Show feedback
            copyMsg.style.display = 'block';
            setTimeout(() => {
                copyMsg.style.display = 'none';
            }, 2000);
        }

        urlInput.addEventListener('input', updateUI);
        
        clearBtn.addEventListener('click', () => {
            urlInput.value = '';
            updateUI();
        });

        // Initialize with autofocus
        window.onload = () => {
            urlInput.focus();
        };
    </script>
</body>
</html>
