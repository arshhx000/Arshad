<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudSnap</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

    :root {
      --bg-1: #0f1115;
      --bg-2: #171a20;
      --panel: rgba(255, 255, 255, 0.07);
      --panel-2: rgba(255, 255, 255, 0.05);
      --line: rgba(255, 255, 255, 0.09);
      --text: #f5f7fb;
      --muted: #a5adba;
      --accent: #8ea2ff;
      --accent-soft: rgba(142, 162, 255, 0.14);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --blur: blur(18px);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(142, 162, 255, 0.16), transparent 26%),
        radial-gradient(circle at 85% 10%, rgba(255, 255, 255, 0.05), transparent 22%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      max-width: 1180px;
      margin: 24px auto;
      padding: 0 20px 24px;
    }

    .window {
      overflow: hidden;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(16, 18, 24, 0.72);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .traffic {
      display: flex;
      gap: 8px;
    }

    .traffic span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: block;
    }

    .traffic span:nth-child(1) { background: #ff5f57; }
    .traffic span:nth-child(2) { background: #febc2e; }
    .traffic span:nth-child(3) { background: #28c840; }

    .logo {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .logo span {
      color: var(--accent);
    }

    .titlebar-right {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .top-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.04);
    }

    .top-nav a {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .top-nav a:hover,
    .top-nav a.active {
      background: rgba(142, 162, 255, 0.18);
      color: var(--accent);
    }

    .hero {
      padding: 56px 24px 24px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(38px, 7vw, 72px);
      line-height: 0.98;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .upload-wrap {
      padding: 0 24px 18px;
    }

    .upload-zone {
      min-height: 270px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      transform: translateY(-2px);
      border-color: rgba(142, 162, 255, 0.28);
      background: rgba(255, 255, 255, 0.09);
    }

    .upload-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px rgba(142, 162, 255, 0.45);
    }

    .upload-main {
      padding: 20px 0;
      text-align: center;
    }

    .upload-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 16px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      border: 1px solid rgba(142, 162, 255, 0.18);
      color: var(--accent);
      font-size: 28px;
    }

    .upload-main h2 {
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: -0.05em;
      font-weight: 600;
    }

    .upload-main p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .upload-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      height: 44px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.08));
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(142, 162, 255, 0.28);
      background: linear-gradient(180deg, rgba(142,162,255,0.18), rgba(255,255,255,0.08));
    }

    .formats {
      color: var(--muted);
      font-size: 12px;
    }

    #fileInput {
      display: none;
    }

    .progress-wrap {
      padding: 0 24px 10px;
    }

    .progress-bar {
      display: none;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #c0ccff);
      transition: width 0.25s ease;
    }

    .gallery-section {
      padding: 18px 24px 28px;
    }

    .gallery-header {
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .gallery-header h2 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .count-badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 12px;
    }

    .image-list {
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .image-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .image-row:last-child {
      border-bottom: none;
    }

    .image-row:hover {
      background: rgba(255, 255, 255, 0.035);
    }

    .image-thumb {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: cover;
      display: block;
      background: rgba(255, 255, 255, 0.05);
    }

    .image-meta {
      min-width: 0;
    }

    .image-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
    }

    .image-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .row-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-btn {
      height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .copy-btn:hover {
      border-color: rgba(142, 162, 255, 0.28);
      background: rgba(142, 162, 255, 0.11);
    }

    .empty-state {
      padding: 64px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(26, 29, 36, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      padding: 0 24px 22px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .app-shell {
        margin: 0;
        padding: 0;
      }

      .window {
        border-radius: 0;
        min-height: 100vh;
      }

      .titlebar,
      .hero,
      .upload-wrap,
      .progress-wrap,
      .gallery-section,
      footer {
        padding-left: 16px;
        padding-right: 16px;
      }

      .hero {
        padding-top: 42px;
      }

      .titlebar-right {
        display: none;
      }

      .upload-zone {
        min-height: 240px;
        padding: 18px;
      }

      .upload-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .image-row {
        grid-template-columns: 48px minmax(0, 1fr);
        gap: 12px;
      }

      .image-thumb {
        width: 48px;
        height: 48px;
        border-radius: 12px;
      }

      .row-actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
        padding-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="window">
      <nav class="titlebar">
        <div class="titlebar-left">
          <div class="traffic">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="logo">Cloud<span>Snap</span></div>
        </div>
        <div class="titlebar-right">Image hosting</div>
      </nav>

      <nav class="top-nav">
        <a href="#upload" class="active">Upload</a>
        <a href="#library">Library</a>
        <a href="#footer">About</a>
      </nav>

      <section class="hero">
        <h1>Upload with <span>ease</span></h1>
        <p>Simple image hosting.</p>
      </section>

      <div class="upload-wrap">
        <div class="upload-zone" id="uploadZone">
          <div class="upload-label">
            <span>Drop zone</span>
            <span class="status-dot"></span>
          </div>

          <div class="upload-main">
            <div class="upload-icon">↑</div>
            <h2>Drop images</h2>
            <p>Or choose files.</p>
          </div>

          <div class="upload-actions">
            <button class="btn" type="button" onclick="document.getElementById('fileInput').click()">
              Choose file
            </button>
            <span class="formats">PNG · JPG · GIF · WEBP</span>
          </div>

          <input type="file" id="fileInput" accept="image/*" multiple />
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <section class="gallery-section">
        <div class="gallery-header">
          <h2>Library</h2>
          <span class="count-badge" id="countBadge">0 files</span>
        </div>

        <div class="image-list" id="gallery">
          <div class="empty-state">
            <div class="icon">◻</div>
            <p>No images yet.</p>
          </div>
        </div>
      </section>

      <footer>CloudSnap</footer>
    </div>
  </div>

  <div class="toast" id="toast">Copied</div>

  <script>
    const uploadZone = document.getElementById("uploadZone");
    const fileInput = document.getElementById("fileInput");
    const gallery = document.getElementById("gallery");
    const countBadge = document.getElementById("countBadge");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const toast = document.getElementById("toast");

    loadImages();

    uploadZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      uploadZone.classList.add("dragover");
    });

    uploadZone.addEventListener("dragleave", () => {
      uploadZone.classList.remove("dragover");
    });

    uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      uploadFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener("change", () => {
      uploadFiles(fileInput.files);
      fileInput.value = "";
    });

    async function uploadFiles(files) {
      const imageFiles = [...files].filter(file => file.type.startsWith("image/"));

      if (!imageFiles.length) {
        showToast("Invalid file");
        return;
      }

      for (let i = 0; i < imageFiles.length; i++) {
        const file = imageFiles[i];
        const formData = new FormData();
        formData.append("image", file);

        try {
          progressBar.style.display = "block";
          progressFill.style.width = `${((i + 0.5) / imageFiles.length) * 100}%`;

          const res = await fetch("/upload", {
            method: "POST",
            body: formData
          });

          if (!res.ok) throw new Error("Upload failed");

          const data = await res.json();
          progressFill.style.width = `${((i + 1) / imageFiles.length) * 100}%`;
          addImageRow(data.url, data.filename);
        } catch (error) {
          showToast("Upload failed");
        }
      }

      setTimeout(() => {
        progressBar.style.display = "none";
        progressFill.style.width = "0%";
      }, 500);

      updateCount();
    }

    function addImageRow(url, filename) {
      gallery.querySelectorAll(".empty-state").forEach(el => el.remove());

      const row = document.createElement("div");
      row.className = "image-row";

      row.innerHTML = `
        <img src="${url}" alt="${filename}" class="image-thumb" loading="lazy">
        <div class="image-meta">
          <span class="image-name">${filename}</span>
          <span class="image-sub">Image file</span>
        </div>
        <div class="row-actions">
          <button class="copy-btn" type="button">Copy</button>
        </div>
      `;

      row.querySelector(".copy-btn").addEventListener("click", () => {
        copyLink(`${window.location.origin}${url}`);
      });

      gallery.prepend(row);
      updateCount();
    }

    async function loadImages() {
      try {
        const res = await fetch("/images");
        if (!res.ok) throw new Error("Load failed");

        const data = await res.json();

        if (!data.images || data.images.length === 0) {
          updateCount();
          return;
        }

        gallery.innerHTML = "";

        data.images.forEach((url) => {
          const filename = decodeURIComponent(url.split("/").pop());
          addImageRow(url, filename);
        });
      } catch (error) {
        updateCount();
      }
    }

    function updateCount() {
      const count = gallery.querySelectorAll(".image-row").length;
      countBadge.textContent = `${count} file${count !== 1 ? "s" : ""}`;
    }

    async function copyLink(url) {
      try {
        await navigator.clipboard.writeText(url);
        showToast("Copied");
      } catch {
        showToast("Copy failed");
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
