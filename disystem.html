        }

        /* Small shadow for buttons/inputs */
        .te-shadow-sm { 
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1); 
            transition: all 0.1s ease;
        }
        
        /* Active states simulating physical pressing down */
        .te-active:active {

        ::-webkit-scrollbar-thumb { background: #000; border: 1px solid #e5e5e5; }

        .date-shock {
            position: relative;
            display: inline-block;
            animation: dateShock 650ms steps(2, end);
        }

        .date-shock::before,
        .date-shock::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .date-shock::before {
            color: #FF6B00;
            transform: translate(2px, -1px);
            opacity: 0.85;
            clip-path: inset(0 0 45% 0);
        }

        .date-shock::after {
            color: #00E5FF;
            transform: translate(-2px, 1px);
            opacity: 0.75;
            clip-path: inset(55% 0 0 0);
        }

        @keyframes dateShock {
            0% { transform: skewX(0deg) scale(1); }
            20% { transform: skewX(10deg) scale(1.04); }
            40% { transform: skewX(-10deg) scale(0.98); }
            60% { transform: skewX(6deg) scale(1.03); }
            100% { transform: skewX(0deg) scale(1); }
        }

        .nav-core {
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
            transform-origin: center;
        }

        .nav-core:hover {
            transform: rotate(-8deg) scale(1.08);
            box-shadow: 0 0 0 2px #000, 5px 5px 0 0 #FF6B00;
            background-color: #111;
        }

        .shock-card {
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
            transform-origin: center;
        }

        .shock-card:hover {
            transform: translate(-3px, -3px) rotate(-0.35deg);
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
            background-color: #fffdf4;
        }

        .task-pop {
            position: relative;
            transition: transform 0.14s ease, background-color 0.14s ease;
        }

        .task-pop:hover {
            transform: translateX(3px);
        }

        .task-check {
            position: relative;
            transition: transform 0.14s ease, background-color 0.14s ease;
        }

        .task-pop.is-done .task-check {
            animation: checkBurst 380ms ease-out;
            box-shadow: 0 0 0 2px #000, 0 0 0 6px rgba(255, 107, 0, 0.18);
        }

        .task-pop.is-done::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 0, 0.22), transparent);

            60% { transform: scale(1.16) rotate(6deg); }
            100% { transform: scale(1) rotate(0deg); }

            40% { opacity: 1; }
            100% { transform: translateX(110%); opacity: 0; }

        const toTitleCase = (str) => {
            return String(str || "").replace(/_/g, " ").toLowerCase().split(" ").map(word =>
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(" ");
        };

        const normalizePlans = (rawPlans) => {
            const plans = Array.isArray(rawPlans) ? rawPlans : [rawPlans];

            return plans.map(plan => ({
                id: crypto.randomUUID(),
                title: toTitleCase(plan.title || "Untitled Plan"),
                days: (plan.days || []).map((day, dayIndex) => ({
                    ...day,
                    day: day.day || dayIndex + 1,
                    tasks: (day.tasks || []).map((task, taskIndex) => ({
                        ...task,
                        id: task.id || taskIndex + 1,
                        title: toTitleCase(task.title || "")
                    }))
                })),
                currentDayIndex: 0
            }));
        };

        function App() {
            const [plans, setPlans] = useState(() => normalizePlans(DEFAULT_PRELOAD_PLANS));
            const [showIntro, setShowIntro] = useState(true);
            const [shockDate, setShockDate] = useState(false);
            const [introQuote] = useState(() => {
                const randomIndex = Math.floor(Math.random() * QUOTES.length);
                return QUOTES[randomIndex];
            });
            const currentDate = new Intl.DateTimeFormat("en-US", {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric"
            }).format(new Date());

            useEffect(() => {
                const timer = window.setTimeout(() => {
                    setShowIntro(false);
                    setShockDate(true);
                }, 5000);

                const shockResetTimer = window.setTimeout(() => {
                    setShockDate(false);
                }, 5800);

                return () => {
                    window.clearTimeout(timer);
                    window.clearTimeout(shockResetTimer);
                };
            }, []);

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        const newPlans = normalizePlans(json);
                        setPlans(prev => [...prev, ...newPlans]);
                    } catch (err) {
                        console.error(err);
                    }
                };
                reader.readAsText(file);
                event.target.value = "";
            };

            const downloadSampleJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DEFAULT_PRELOAD_PLANS, null, 2));
                const a = document.createElement("a");
                a.href = dataStr;
                a.download = "sample-plans.json";
                a.click();
            };

            const toggleTask = (planId, dayIndex, taskId) => {
                setPlans(plans.map(p => p.id === planId ? { ...p, days: p.days.map((d, i) => i === dayIndex ? { ...d, tasks: d.tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t) } : d) } : p));
            };

            const setDay = (planId, dayIndex) => {
                setPlans(plans.map(p => p.id === planId ? { ...p, currentDayIndex: dayIndex } : p));
            };

            const deletePlan = (planId) => {
                setPlans(plans.filter(p => p.id !== planId));
            };

            const getProgress = (day) => {
                if (!day || !day.tasks || day.tasks.length === 0) return 0;
                return Math.round((day.tasks.filter(t => t.completed).length / day.tasks.length) * 100);
            };

            if (showIntro) {
                return (
                    <div className="min-h-screen bg-black text-[#FF6B00] flex items-center justify-center px-6">
                        <div className="max-w-3xl text-center">
                            <p className="text-3xl md:text-5xl leading-tight font-sans font-semibold">
                                {introQuote}
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-xl mx-auto space-y-6">
                        {/* Compact Control Deck */}
                        <div className="border-2 border-black bg-white p-3 te-shadow flex items-center justify-between">
                            <div className="nav-core bg-black text-white p-2 border-2 border-black">
                                <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18"/><path d="M7 8l4 4-4 4M13 16h4"/></svg>
                            </div>
                            <div className="flex-1 px-3">
                                <div
                                    data-text={currentDate}
                                    className={`text-xs md:text-sm font-medium text-center text-black truncate ${shockDate ? "date-shock" : ""}`}
                                >
                                    {currentDate}
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={downloadSampleJSON} className="border-2 border-black bg-[#00E5FF] p-2 te-shadow-sm te-active">
                                    <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4H3v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                </button>
                                <label className="border-2 border-black bg-[#FF6B00] p-2 te-shadow-sm te-active cursor-pointer">
                                    <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4H3v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    <input type="file" accept=".json" onChange={handleFileUpload} className="hidden" />
                                </label>
                            </div>
                        </div>

                        {plans.length === 0 ? (
                            <div className="border-2 border-black bg-white p-8 text-center te-shadow">
                                <h2 className="text-xl">Awaiting Input</h2>
                            </div>
                        ) : (
                            plans.map(plan => (
                                <div key={plan.id} className="shock-card border-2 border-black bg-white te-shadow">
                                    {/* Compact Header */}
                                    <div className="border-b-2 border-black p-4 bg-[#FFD600] flex justify-between items-center">
                                        <h2 className="text-xl truncate">{plan.title}</h2>
                                        <div className="flex items-center gap-3">
                                            <div className="text-sm border-2 border-black bg-black text-[#FFD600] px-2 py-0.5">{Math.round(plan.days.reduce((acc, d) => acc + getProgress(d), 0) / plan.days.length || 0)}%</div>
                                            <button onClick={() => deletePlan(plan.id)} className="border-2 border-black bg-red-500 text-white px-2 py-0.5 text-xs te-shadow-sm te-active">Del</button>
                                        </div>
                                    </div>

                                    {/* Day Navigation */}
                                    <div className="flex border-b-2 border-black bg-[#d4d4d4] p-1 gap-1 overflow-x-auto">
                                        {plan.days.map((day, idx) => (
                                            <button key={idx} onClick={() => setDay(plan.id, idx)} className={`px-3 py-1 text-sm border-2 border-black ${plan.currentDayIndex === idx ? "bg-[#FF6B00] te-shadow-sm" : "bg-white"}`}>
                                                Day {day.day}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="p-4 bg-white">
                                        {plan.days[plan.currentDayIndex] && (
                                            <div>
                                                <div className="flex justify-between items-center mb-4 border-b border-black pb-2">
                                                    <h3 className="text-lg">Day {plan.days[plan.currentDayIndex].day}</h3>
                                                    <span className="text-sm bg-gray-200 px-2 py-0.5 border border-black">{getProgress(plan.days[plan.currentDayIndex])}%</span>
                                                </div>
                                                <div className="space-y-3">
                                                    {plan.days[plan.currentDayIndex].tasks.map(task => (
                                                        <div key={task.id} onClick={() => toggleTask(plan.id, plan.currentDayIndex, task.id)} className={`task-pop border-2 border-black p-2 flex items-center gap-3 cursor-pointer overflow-hidden ${task.completed ? "is-done bg-gray-100" : "bg-white"}`}>
                                                            <div className={`task-check w-6 h-6 border-2 border-black ${task.completed ? "bg-[#00E5FF]" : ""}`}></div>
                                                            <span className={`text-base ${task.completed ? "line-through text-gray-500" : ""}`}>{task.title}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
